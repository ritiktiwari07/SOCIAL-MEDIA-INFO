<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ritik Social Links</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #121212);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    text-align: center;
}

h1 {
    color: white;
    margin-bottom: 40px;
}

.social-icons a {
    text-decoration: none;
    margin: 20px;
    display: inline-block;
}

.social-icons img {
    width: 70px;
    height: 70px;
    transition: 0.3s;
    border-radius: 20px;
}

.social-icons img:hover {
    transform: scale(1.2);
}
.coming-soon {
    color: white;
    margin-top: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Follow Me</h1>

    <div class="social-icons">

        <!-- Instagram -->
        <a href="https://www.instagram.com/edit_by_ritik07?igsh=eWUxOGhpMjB4MjBz" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram">
        </a>

        <!-- Telegram -->
        <a href="https://t.me/artbyritik" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" alt="Telegram">
        </a>

        <!-- YouTube Coming Soon -->
        <div>
            <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="YouTube">
            <div class="coming-soon">Coming Soon</div>
        </div>

    </div>
</div>

</body>
</html>
